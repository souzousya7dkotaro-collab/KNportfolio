<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.11/dist/vue.js"></script>
    <title>簡易POSシステム</title>
</head>
<body>
    <div class="arrive" id="arrive">
    <h1>入荷画面</h1>

        <fieldset class="arrive-product-top">
            <form @submit.prevent="arriveProduct" class="arrive-product">
                <div class="selected-number">
                        <label for="selected-product">入荷商品</label>

                        <select name="selected-product" id="selected-product"
                        v-model="selectedProduct">

                            <option value="" disabled
                            >商品を選んで下さい</option>
                            <option v-for="product in products" :key="product.id"
                            :value="product.id">{{product.name}}</option>
                            
                        </select>
                    </div>
                    <div class="number-product">
                        <label for="number-product">個数</label>
                        <input type="number" id="number-product"
                        v-model.number="numberProduct" min="1">
                    </div>
                    <button type="submit">個数登録</button>
            </form>

            <form @submit.prevent="newProduct" class="register-product">
                <div class="new-product">
                    <label for="new-product-name">新商品</label>
                    <input type="text" id="new-product-name"
                    v-model="newProductName" placeholder="未登録の商品名を入力">
                </div>
                <div class="price-product">
                    <label for="new-product-price">価格</label>
                    <input type="number" id="new-product-price"
                    v-model.number="newProductPrice" min="0"
                    placeholder="価格を入力">
                </div>
                <button type="submit">商品登録</button>
            </form>

        </fieldset>
   

        <div>
            <a href="index.html">業務選択画面に戻る</a>
        </div>
     </div>

    <script src="./data/data.js"></script>
    <script src="./data/history_data.js"></script>
    <script src="./js/arrive.js"></script>
</body>
</html>
